services:
  # PostgreSQL with TimescaleDB extension
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: newstrack_db
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newstrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: newstrack_api
    env_file: .env
    environment:
      # Override host for Docker internal networking
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./config:/app/config
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
    links:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Data pipeline worker (fetch → scrape → classify loop)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: newstrack_worker
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      FETCH_INTERVAL: "${FETCH_INTERVAL:-900}"
      SCRAPE_INTERVAL: "${SCRAPE_INTERVAL:-300}"
      CLASSIFY_INTERVAL: "${CLASSIFY_INTERVAL:-1800}"
      SCRAPE_BATCH_SIZE: "${SCRAPE_BATCH_SIZE:-50}"
      CLASSIFY_BATCH_SIZE: "${CLASSIFY_BATCH_SIZE:-20}"
    volumes:
      - ./backend:/app
      - ./config:/app/config
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
    links:
      - db
    restart: unless-stopped
    command: python -m scripts.worker

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: newstrack_frontend
    environment:
      API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    links:
      - api

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: newstrack_network
