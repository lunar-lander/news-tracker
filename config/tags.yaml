# Tags Configuration for India News Tracker
# Last Updated: 2025-11-14
#
# This file defines all the tags/categories used to classify news articles
# Each tag has:
# - keywords: Words/phrases that indicate this category
# - severity_weights: Importance multipliers for different sub-types
# - color: Hex color code for visualization (vibrant for black background)

# ============================================================================
# ENABLED CATEGORIES
# ============================================================================

