# LLM Configuration for India News Observer
# Last Updated: 2026-04-02
#
# Supports multiple LLM providers with automatic fallback.
# Primary and fallback providers are selected at runtime
# based on which API keys are set in the environment.

# ============================================================================
# PROVIDER PREFERENCE ORDER
# ============================================================================
# At startup, the system checks which API keys are available and picks
# the first provider with a valid key as primary, the second as fallback.

provider_preference:
  - google       # Cheapest (Gemini Flash)
  - anthropic    # Best quality fallback
  - openai       # Alternative

# ============================================================================
# PROVIDER CONFIGURATIONS
# ============================================================================

# OpenAI Configuration
openai:
  provider: "openai"
  model: "gpt-4.1-mini"  # or "gpt-4.1" for better accuracy
  api_key: "${OPENAI_API_KEY}"
  max_tokens: 2048
  temperature: 0.2

  rate_limits:
    requests_per_minute: 60
    concurrent_requests: 10

  retry_policy:
    max_retries: 3
    backoff_factor: 2

# Anthropic Configuration
anthropic:
  provider: "anthropic"
  models:
    cheap: "claude-haiku-4-20250414"
    balanced: "claude-sonnet-4-20250514"
    best: "claude-opus-4-20250514"
  api_key: "${ANTHROPIC_API_KEY}"
  max_tokens: 2048
  temperature: 0.2

  rate_limits:
    requests_per_minute: 50
    concurrent_requests: 5

# Google Gemini Configuration
google:
  provider: "google"
  models:
    cheap: "gemini-2.5-flash-lite"
    balanced: "gemini-2.5-flash"
    best: "gemini-2.5-pro"
  api_key: "${GOOGLE_API_KEY}"
  max_tokens: 2048
  temperature: 0.2

  rate_limits:
    requests_per_minute: 600
    concurrent_requests: 15

# Cohere Configuration
cohere:
  provider: "cohere"
  model: "command-r-plus"
  api_key: "${COHERE_API_KEY}"
  max_tokens: 2048
  temperature: 0.2

  rate_limits:
    requests_per_minute: 40
    concurrent_requests: 10

# Local Model Configuration (Ollama)
local:
  provider: "local"
  model: "llama3"  # or "mistral", "mixtral"
  api_url: "http://localhost:11434"  # Ollama default
  max_tokens: 2048
  temperature: 0.2

  rate_limits:
    requests_per_minute: 1000  # No external rate limit
    concurrent_requests: 4  # Based on local GPU

# ============================================================================
# PROMPT CONFIGURATION
# ============================================================================

prompts:
  classification:
    template_file: "config/prompts/classification.txt"
    variables:
      - article_text
      - available_tags

  entity_extraction:
    template_file: "config/prompts/entity-extraction.txt"
    variables:
      - article_text

# ============================================================================
# BATCH PROCESSING
# ============================================================================

batch_processing:
  enabled: true
  batch_size: 10  # Process 10 articles at once
  wait_between_batches: 2  # seconds

  # Cost optimization
  cost_optimization:
    cache_responses: true  # Cache LLM responses in database
    cache_duration: 2592000  # 30 days in seconds
    skip_similar_articles: true  # Skip if very similar article already classified
    similarity_threshold: 0.95  # 95% similarity

# ============================================================================
# RESPONSE PARSING
# ============================================================================

response_parsing:
  format: "json"  # Expect JSON response from LLM

  required_fields:
    - tags
    - confidence_scores
    - summary
    - severity

  optional_fields:
    - state
    - city
    - incident_date
    - persons
    - organizations

  validation:
    min_confidence: 0.5  # Minimum confidence score to accept a tag
    max_tags: 10  # Maximum tags per article
    min_tags: 1  # Minimum tags per article

# ============================================================================
# ERROR HANDLING
# ============================================================================

error_handling:
  on_parse_error: "retry"  # Options: retry, skip, manual_review
  on_low_confidence: "flag"  # Options: flag, skip, manual_review
  on_no_tags: "skip"  # Options: skip, retry, manual_review

  logging:
    log_all_requests: false  # Set to true for debugging
    log_failed_requests: true
    log_low_confidence: true
    log_file: "logs/llm-classification.log"

# ============================================================================
# COST TRACKING
# ============================================================================

cost_tracking:
  enabled: true

  # Costs per 1M tokens (approximate, update as needed)
  pricing:
    openai:
      gpt-4.1-mini:
        input: 0.40  # USD per 1M input tokens
        output: 1.60  # USD per 1M output tokens
      gpt-4.1:
        input: 2.00
        output: 8.00

    anthropic:
      claude-haiku-4:
        input: 0.80
        output: 4.00
      claude-sonnet-4:
        input: 3.00
        output: 15.00
      claude-opus-4:
        input: 15.00
        output: 75.00

    google:
      gemini-2.5-flash:
        input: 0.15
        output: 0.60
      gemini-2.5-pro:
        input: 1.25
        output: 10.00

    cohere:
      command-r-plus:
        input: 3.00
        output: 15.00

  # Budget alerts
  budget:
    daily_limit: 10.00  # USD
    monthly_limit: 200.00  # USD
    alert_threshold: 0.80  # Alert at 80% of limit

# ============================================================================
# PERFORMANCE MONITORING
# ============================================================================

monitoring:
  track_latency: true
  track_success_rate: true
  track_token_usage: true

  metrics_log_file: "logs/llm-metrics.log"

  alerts:
    high_latency_threshold: 10  # seconds
    low_success_rate_threshold: 0.85  # 85%
    high_cost_per_article: 0.10  # USD
