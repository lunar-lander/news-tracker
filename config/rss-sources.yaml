# RSS Feed Sources for India News Tracker
# Last Updated: 2025-11-14
#
# VALIDATION RESULTS (2025-11-14):
# - Total feeds tested: 116
# - Working feeds: 14 (12.1%)
# - Broken feeds: 102 (87.9%)
#
# NOTE: This configuration has been cleaned to include only validated, working RSS feeds.
# Most major Indian news outlets (Times of India, The Hindu, Indian Express, Hindustan Times)
# have disabled public RSS access or return HTTP 403 errors.
#
# Categories:
# - national: Major national news outlets
# - regional: State/region-specific outlets
# - language: Non-English language outlets
#
# Priority levels:
# - high: Check every 5 minutes
# - medium: Check every 10 minutes
# - low: Check every 30 minutes

# ============================================================================
# NATIONAL NEWS OUTLETS (ENGLISH)
# ============================================================================

national_english:
  - name: "NDTV"
    url: "https://feeds.feedburner.com/ndtvnews-india-news"
    category: "national"
    language: "english"
    region: "national"
    refresh_interval: 300
    enabled: true
    priority: "high"

  - name: "The Quint"
    url: "https://www.thequint.com/feed"
    category: "national"
    language: "english"
    region: "national"
    refresh_interval: 600
    enabled: true
    priority: "medium"

  - name: "ThePrint - India"
    url: "https://theprint.in/category/india/feed/"
    category: "national"
    language: "english"
    region: "national"
    refresh_interval: 600
    enabled: true
    priority: "medium"

